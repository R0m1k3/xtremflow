name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Infos (pre-existing withOpacity/dart:html deprecations) are not
      # fatal; errors and warnings still fail the build.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - run: flutter build web --release

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bin
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test
