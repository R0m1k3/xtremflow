services:
  xtremflow:
    # Build direct depuis GitHub (l'image GHCR sera utilisée quand le
    # workflow Docker Publish sera réparé : image: ghcr.io/r0m1k3/xtremflow:latest)
    build:
      context: https://github.com/R0m1k3/xtremflow.git
      dockerfile: Dockerfile
    container_name: xtremflow
    ports:
      - "8089:8089"
    environment:
      - ALLOWED_ORIGIN=https://xtrem.vonrodbox.eu
      - MAX_CONCURRENT_RECORDINGS=2
      - NVIDIA_GPU=true
    volumes:
      - xtremflow-data:/app/data
      - /mnt/user/Data/Sport:/app/recordings
    restart: unless-stopped

volumes:
  xtremflow-data:
