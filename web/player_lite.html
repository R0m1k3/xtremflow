<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>IPTV Player Lite</title>
    <!-- HLS.js and mpegts.js for MPEG-TS support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #player-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #video {
            width: 100%;
            height: 100%;
            background: #000;
        }

        #error {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            z-index: 30;
        }

        #error-icon {
            font-size: 64px;
            color: #f44336;
            margin-bottom: 16px;
        }

        #loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            z-index: 20;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Safari Autoplay Hint Overlay */
        #play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 25;
        }

        #play-overlay svg {
            width: 40px;
            height: 40px;
            fill: white;
            margin-left: 4px;
        }
    </style>
</head>

<body>
    <div id="player-container">
        <!-- iOS/Safari core attributes -->
        <video id="video" autoplay playsinline webkit-playsinline preload="auto"></video>

        <div id="play-overlay">
            <svg viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <div id="loading-text">Chargement du flux...</div>
        </div>
        <div id="error">
            <div id="error-icon">⚠</div>
            <div id="error-message">Erreur de chargement</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const error = document.getElementById('error');
        const errorMessage = document.getElementById('error-message');
        const playOverlay = document.getElementById('play-overlay');

        // Get parameters from query string
        const urlParams = new URLSearchParams(window.location.search);
        let streamUrl = urlParams.get('url');
        const startTime = parseFloat(urlParams.get('t') || '0');
        const streamType = urlParams.get('type') || ''; // 'live' or 'vod'

        function log(msg) {
            console.log('[LitePlayer] ' + msg);
        }

        function showLoading(msg) {
            loading.style.display = 'block';
            loadingText.textContent = msg || 'Chargement du flux...';
            error.style.display = 'none';
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        function showError(message) {
            hideLoading();
            error.style.display = 'block';
            errorMessage.textContent = message || 'Erreur de chargement';
        }

        playOverlay.addEventListener('click', () => {
            log('Manual play triggered');
            video.play();
            playOverlay.style.display = 'none';
        });

        // Seek to startTime when video is ready
        video.addEventListener('loadedmetadata', () => {
            if (startTime > 0 && startTime < video.duration) {
                video.currentTime = startTime;
            }
        });

        // Report position to parent
        let lastReportedTime = 0;
        function reportPosition() {
            if (video.currentTime > 0 && !video.paused && video.readyState > 2) {
                if (Math.abs(video.currentTime - lastReportedTime) >= 5) {
                    lastReportedTime = video.currentTime;
                    window.parent.postMessage({
                        type: 'playback_position',
                        currentTime: video.currentTime,
                        duration: isFinite(video.duration) ? video.duration : 0
                    }, '*');
                }
            }
        }
        setInterval(reportPosition, 5000);

        video.addEventListener('pause', () => {
            window.parent.postMessage({ type: 'playback_status', status: 'paused' }, '*');
            if (video.currentTime === 0 || video.paused) {
                loading.style.display = 'none';
                playOverlay.style.display = 'flex';
            }
        });

        video.addEventListener('playing', () => {
            window.parent.postMessage({ type: 'playback_status', status: 'playing' }, '*');
            hideLoading();
            playOverlay.style.display = 'none';
        });

        video.addEventListener('ended', () => {
            window.parent.postMessage({
                type: 'playback_ended',
                duration: isFinite(video.duration) ? video.duration : 0
            }, '*');
        });

        // Activity reporting
        function reportActivity() {
            window.parent.postMessage({ type: 'user_activity' }, '*');
        }
        document.addEventListener('mousemove', reportActivity);
        document.addEventListener('touchstart', reportActivity);
        document.addEventListener('click', reportActivity);

        async function playWithHLS(url) {
            log('Trying HLS.js with: ' + url);
            showLoading('Chargement HLS...');

            if (!Hls.isSupported()) {
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.load();
                    video.play().catch(() => {
                        loading.style.display = 'none';
                        playOverlay.style.display = 'flex';
                    });
                    return true;
                }
                return false;
            }

            const isTurbo = urlParams.get('turbo') === 'true';

            const hls = new Hls({
                maxBufferLength: 120, // Doubled for stability
                maxMaxBufferLength: 240,
                enableWorker: true,
                liveSyncDurationCount: 3, // Reduced for faster initial sync
                liveMaxLatencyDurationCount: 40,
                lowLatencyMode: false, // Disabled for better stability on laggy connections
                // Robustness features
                nudgeOffset: 0.5, // Jump over discontinuities more aggressively
                nudgeMaxRetries: 20,
                maxLiveSyncPlaybackRate: 1.2, // Smooth catch-up
                // Turbo-Start specific
                startLevel: 0, // Force lowest level for instant start
                initialLiveManifestSize: 1,
                abrEwmaDefaultEstimate: 500000,
                manifestLoadingRetryDelay: 500,
                levelLoadingRetryDelay: 500
            });

            window.hlsInstance = hls;
            hls.loadSource(url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                hideLoading();
                video.play().catch(() => playOverlay.style.display = 'flex');
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                    else showError('HLS Error: ' + data.details);
                }
            });

            return true;
        }

        async function playWithMpegTS(url, isLive = true) {
            log('Trying mpegts.js with: ' + url);
            showLoading('Chargement MPEG-TS...');

            if (!mpegts.isSupported()) return false;

            const isTurbo = urlParams.get('turbo') === 'true';
            const player = mpegts.createPlayer({
                type: 'mpegts',
                isLive: isLive,
                url: url
            }, {
                enableWorker: true,
                stashInitialSize: 64 * 1024, // Turbo Start: 64KB initial buffer
                enableStashBuffer: true,
                liveBufferLatencyChasing: true,
                liveBufferLatencyChasingOnPaused: true,
                liveBufferLatencyMaxLatency: 10.0,
                liveBufferLatencyMinLatency: 2.0,
                lazyLoad: false,
                maxStashSize: 20 * 1024 * 1024
            });

            player.attachMediaElement(video);
            player.load();
            player.play().catch(() => playOverlay.style.display = 'flex');

            player.on(mpegts.Events.ERROR, () => showError('MpegTS Error'));

            return true;
        }

        async function initPlayer() {
            if (!streamUrl) return showError('No URL');
            log('Stream URL: ' + streamUrl);

            const lowerUrl = streamUrl.toLowerCase();
            const isHLS = lowerUrl.includes('.m3u8') || lowerUrl.includes('/playlist.m3u8');

            if (isHLS) {
                await playWithHLS(streamUrl);
            } else {
                await playWithMpegTS(streamUrl, streamType === 'live');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === 'play') video.play().catch(() => playOverlay.style.display = 'flex');
            else if (data.type === 'pause') video.pause();
        });

        initPlayer();
    </script>
</body>

</html>
