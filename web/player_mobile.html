<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #player-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #loading {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            z-index: 20;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Unmute button — shown when iOS plays muted */
        #unmute-btn {
            display: none;
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        #unmute-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        #error {
            display: none;
            position: absolute;
            color: white;
            text-align: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 16px;
            z-index: 30;
            max-width: 80%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div id="player-container">
        <!-- muted + autoplay: iOS Safari autorise l'autoplay uniquement si muted -->
        <video id="video" autoplay muted playsinline webkit-playsinline preload="auto"></video>

        <!-- Bouton son — affiché après démarrage muted sur iOS -->
        <button id="unmute-btn">🔇 Appuyer pour activer le son</button>

        <div id="loading">
            <div class="spinner"></div>
            <div id="l-text" style="font-size: 14px; font-weight: 500;">Chargement...</div>
        </div>

        <div id="error">
            <div style="font-size: 40px; margin-bottom: 12px;">⚠️</div>
            <div id="err-msg" style="font-weight: 600;">Erreur de lecture</div>
            <div id="err-sub" style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 8px;">Vérifiez votre connexion</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');
        const unmuteBtn = document.getElementById('unmute-btn');
        const error = document.getElementById('error');

        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url');
        const streamType = params.get('type') || 'live';

        function log(m) { console.log('[MobilePlayer] ' + m); }

        let retryCount = 0;
        const maxRetries = 3;

        function showError(code, msg) {
            loading.style.display = 'none';
            unmuteBtn.style.display = 'none';
            error.style.display = 'block';
            document.getElementById('err-msg').textContent = 'Erreur ' + code;
            document.getElementById('err-sub').textContent = msg || 'Format non supporté ou lien expiré';
        }

        // Bouton son : user gesture DIRECT dans l'iframe → iOS accepte le unmute
        unmuteBtn.addEventListener('click', (e) => {
            e.preventDefault();
            video.muted = false;
            video.volume = 1.0;
            unmuteBtn.style.display = 'none';
            log('Unmuted by user');
            window.parent.postMessage({ type: 'unmuted' }, '*');
        });

        video.addEventListener('touchend', () => {
            window.parent.postMessage({ type: 'user_activity' }, '*');
        });

        video.addEventListener('playing', () => {
            log('Video playing, muted=' + video.muted);
            loading.style.display = 'none';
            retryCount = 0;
            // Si muted (iOS autoplay), afficher le bouton son
            if (video.muted) {
                unmuteBtn.style.display = 'block';
                // Tenter de démueter automatiquement (fonctionne parfois après interaction)
                video.muted = false;
                if (video.muted) {
                    // iOS a refusé le unmute automatique — garder le bouton affiché
                    log('Unmute blocked by iOS, showing button');
                } else {
                    unmuteBtn.style.display = 'none';
                    log('Auto-unmuted successfully');
                }
            }
        });

        video.addEventListener('error', () => {
            const code = video.error?.code || '?';
            const msg = video.error?.message || '';
            log('Video error code=' + code + ' msg=' + msg + ' retry=' + retryCount);

            if (retryCount < maxRetries) {
                retryCount++;
                log('Retry ' + retryCount + '/' + maxRetries + ' in 2s');
                loading.style.display = 'flex';
                error.style.display = 'none';
                document.getElementById('l-text').textContent = 'Reconnexion ' + retryCount + '/' + maxRetries + '...';
                setTimeout(startPlayback, 2000);
            } else {
                showError(code, msg);
            }
        });

        function startPlayback() {
            log('startPlayback: ' + streamUrl);
            video.src = '';
            video.load();
            video.src = streamUrl;
            video.load();
            video.play().catch(e => {
                log('play() rejected: ' + e);
                // Ne pas montrer erreur ici — laisser l'event error gérer
            });
        }

        function initHlsJs() {
            log('Using HLS.js');
            const hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 60,
                liveSyncDurationCount: 5,
                liveMaxLatencyDurationCount: 10,
                enableWorker: true,
                lowLatencyMode: false,
                nudgeOffset: 0.8,
                nudgeMaxRetries: 10,
                manifestLoadingRetryDelay: 1000,
                levelLoadingRetryDelay: 1000
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                log('HLS manifest parsed');
                video.play().catch(() => log('HLS autoplay blocked'));
            });
            hls.on(Hls.Events.ERROR, (e, d) => {
                log('HLS error type=' + d.type + ' fatal=' + d.fatal);
                if (d.fatal) {
                    if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                    else showError(d.type, 'Erreur HLS fatale');
                }
            });
        }

        function initMpegts() {
            log('Using MpegTS');
            const player = mpegts.createPlayer({
                type: 'mpegts',
                isLive: streamType === 'live',
                url: streamUrl
            }, {
                enableWorker: true,
                stashInitialSize: 512 * 1024,
                enableStashBuffer: true,
                liveBufferLatencyChasing: false,
                maxStashSize: 30 * 1024 * 1024
            });
            player.on(mpegts.Events.ERROR, (type, detail) => {
                log('MpegTS error type=' + type);
                showError(type, JSON.stringify(detail));
            });
            player.attachMediaElement(video);
            player.load();
            player.play().catch(() => log('MpegTS autoplay blocked'));
        }

        function init() {
            if (!streamUrl) {
                log('No stream URL');
                showError('URL', 'Pas de lien de flux');
                return;
            }
            log('Init: ' + streamUrl + ' type=' + streamType);

            const isHLS = streamUrl.toLowerCase().includes('m3u8');
            const isTS = streamUrl.toLowerCase().endsWith('.ts');
            log('isHLS=' + isHLS + ' isTS=' + isTS);

            // iOS Safari — HLS natif avec muted autoplay
            if (isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
                log('iOS Safari native HLS (muted autoplay)');
                startPlayback();
                return;
            }

            // Android/Chrome — HLS.js
            if (isHLS && Hls.isSupported()) {
                initHlsJs();
                return;
            }

            // MpegTS fallback
            if (mpegts.isSupported()) {
                initMpegts();
                return;
            }

            // Direct fallback
            log('Direct fallback');
            startPlayback();
        }

        // Messages depuis Flutter
        window.addEventListener('message', (e) => {
            const d = e.data;
            if (!d) return;
            if (d.type === 'play') video.play().catch(() => {});
            if (d.type === 'pause') video.pause();
            if (d.type === 'set_volume') {
                video.muted = d.value === 0;
                video.volume = d.value;
                if (d.value > 0) unmuteBtn.style.display = 'none';
            }
        });

        init();
    </script>
</body>

</html>
