services:
  xtremflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtremflow
    ports:
      - "8089:8089"
    volumes:
      - xtremflow-data:/app/data
      # Configuration du répertoire d'enregistrement TV
      # Par défaut: sauve dans ./data/recordings (dossier local)
      # Pour changer: modifiez le chemin avant les deux points ":"
      # Exemple Windows : - D:\MesVideos\TV:/app/recordings
      # Exemple Linux   : - /mnt/nas/videos:/app/recordings
      - ${RECORDINGS_PATH:-/mnt/user/Data/Sport}:/app/recordings
    environment:
      # Origine externe autorisée pour CORS (optionnel — l'app est servie
      # same-origin, ne définir que si un autre domaine doit appeler l'API)
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-}
      # Nombre max d'enregistrements TV simultanés (FFmpeg -c copy, peu de CPU)
      - MAX_CONCURRENT_RECORDINGS=${MAX_CONCURRENT_RECORDINGS:-2}
      # Accélération GPU NVIDIA pour le transcodage (NVENC) : true/false
      - NVIDIA_GPU=${NVIDIA_GPU:-false}
    restart: unless-stopped

volumes:
  xtremflow-data:
